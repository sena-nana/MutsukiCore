[build]
# Avoid inheriting a stale machine-specific absolute path.
rustc-wrapper = "sccache"

[alias]
c = "check --workspace --all-targets"
t = "test --workspace --all-targets"
lint = "clippy --workspace --all-targets -- -D warnings"
timings = "build --workspace --timings"
bench-full = "run --release --package mutsuki-runtime-benchmarks -- full --lane time --warmup 1 --samples 5 --gate smoke"
bench-smoke = "run --release --package mutsuki-runtime-benchmarks -- smoke --lane time --warmup 0 --samples 1 --gate smoke"
bench-reference = "!python3 scripts/run-core-reference.py"
