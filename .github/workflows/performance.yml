name: Public performance smoke

on:
  schedule:
    - cron: "23 3 * * *"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-smoke:
    name: Full correctness and catastrophic-regression matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run full public-runner smoke
        run: >-
          cargo run --release --package mutsuki-runtime-benchmarks --
          full
          --lane time
          --warmup 1
          --samples 3
          --gate smoke
          --output target/mutsuki-benchmarks/core-public-ci-${{ github.run_id }}.json

      - name: Upload structured smoke result
        uses: actions/upload-artifact@v4
        with:
          name: core-public-performance-smoke-${{ github.run_id }}
          path: target/mutsuki-benchmarks/core-public-ci-${{ github.run_id }}.json
          retention-days: 90

      - name: Explain evidence boundary
        run: >-
          echo "Public runner results are smoke evidence only and cannot approve or replace a release baseline."

  fixed-reference:
    name: Fixed reference (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            labels: [self-hosted, mutsuki-reference, macOS, ARM64]
          - name: windows-x64
            labels: [self-hosted, mutsuki-reference, Windows, X64]
    runs-on: ${{ matrix.labels }}
    timeout-minutes: 360
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run owner reference
        run: >-
          python scripts/run-core-reference.py
          --mode full
          --output artifacts/perf/reference-${{ matrix.name }}/report.json
      - uses: actions/upload-artifact@v4
        with:
          name: core-reference-${{ matrix.name }}-${{ github.run_id }}
          path: artifacts/perf/reference-${{ matrix.name }}/
          retention-days: 90
          if-no-files-found: error
